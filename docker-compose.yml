version: '3.9'

services:
  backend:
    build: ./backend
    container_name: news-archive-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/archive.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: news-archive-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
